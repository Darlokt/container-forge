minimum_prek_version: 0.3.9

repos:
  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: d9fca3320346514799461a80b0753eb45d707d46 # frozen: 0.11.28
    hooks:
      - id: uv-lock
        name: Refresh uv.lock
        priority: 0

  - repo: local
    hooks:
      - id: validate-environment-contract
        name: Validate environment contract
        entry: ./scripts/validate-contract.sh
        language: system
        pass_filenames: false
        always_run: true
        priority: 10
