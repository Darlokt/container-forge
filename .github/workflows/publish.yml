name: Build and publish environment
run-name: Publish ${{ inputs.environment_branch }} (${{ inputs.include_arm64 && 'amd64+arm64' || 'amd64' }})

on:
  workflow_dispatch:
    inputs:
      environment_branch:
        description: Lowercase environment branch to publish (not main)
        required: true
        type: string
      include_arm64:
        description: Publish a linux/arm64 variant in addition to linux/amd64
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write
  artifact-metadata: write

concurrency:
  group: publish-${{ inputs.environment_branch }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-24.04
    timeout-minutes: 90

    steps:
      - name: Validate dispatch settings
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          ENVIRONMENT_BRANCH: ${{ inputs.environment_branch }}
        shell: bash
        run: |
          set -euo pipefail
          [[ "$GITHUB_REF_TYPE" == branch && "$GITHUB_REF_NAME" == "$DEFAULT_BRANCH" ]] || {
            echo "Run this workflow from the default branch ($DEFAULT_BRANCH), not $GITHUB_REF_NAME." >&2
            exit 1
          }
          [[ "$ENVIRONMENT_BRANCH" != main ]] || {
            echo 'main is the non-publishable template branch.' >&2
            exit 1
          }
          [[ "$ENVIRONMENT_BRANCH" =~ ^[a-z0-9][a-z0-9._-]*$ ]] || {
            echo 'The environment branch must match ^[a-z0-9][a-z0-9._-]*$.' >&2
            exit 1
          }

      - name: Check out environment branch
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          ref: ${{ inputs.environment_branch }}

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: 0.11.28
          enable-cache: true

      - name: Validate environment contract
        env:
          ENVIRONMENT_BRANCH: ${{ inputs.environment_branch }}
        run: ./scripts/validate-contract.sh "$ENVIRONMENT_BRANCH"

      - name: Derive build settings
        id: vars
        env:
          ENVIRONMENT_BRANCH: ${{ inputs.environment_branch }}
        shell: bash
        run: |
          set -euo pipefail
          commit_sha="$(git rev-parse HEAD)"
          remote_sha="$(git ls-remote --exit-code --heads origin \
            "refs/heads/$ENVIRONMENT_BRANCH" | awk '{ print $1 }')"
          [[ "$commit_sha" == "$remote_sha" ]] || {
            echo "Checked out $commit_sha but origin/$ENVIRONMENT_BRANCH is $remote_sha; retry the publish." >&2
            exit 1
          }
          image="ghcr.io/${GITHUB_REPOSITORY,,}/${ENVIRONMENT_BRANCH}"
          if [[ "${{ inputs.include_arm64 }}" == true ]]; then
            platforms='linux/amd64,linux/arm64'
            platform_scope='amd64-arm64'
          else
            platforms='linux/amd64'
            platform_scope='amd64'
          fi
          {
            echo "branch=$ENVIRONMENT_BRANCH"
            echo 'candidate_tag=ci-candidate'
            echo "commit_sha=$commit_sha"
            echo "image=$image"
            echo "python_version=$(<.python-version)"
            echo "platforms=$platforms"
            echo "cache_scope=${ENVIRONMENT_BRANCH}-${platform_scope}"
          } >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        if: inputs.include_arm64
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Refuse to overwrite immutable commit tag
        env:
          COMMIT_SHA: ${{ steps.vars.outputs.commit_sha }}
          IMAGE: ${{ steps.vars.outputs.image }}
        shell: bash
        run: |
          set -euo pipefail
          if output="$(docker buildx imagetools inspect "$IMAGE:$COMMIT_SHA" 2>&1)"; then
            echo "Refusing to overwrite existing image $IMAGE:$COMMIT_SHA" >&2
            exit 1
          fi
          if ! grep -Eqi 'manifest unknown|no such manifest|not found' <<< "$output"; then
            echo "$output" >&2
            echo 'Unable to determine whether the immutable commit tag exists.' >&2
            exit 1
          fi

      - name: Generate candidate metadata
        id: metadata
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ steps.vars.outputs.image }}
          tags: type=raw,value=${{ steps.vars.outputs.candidate_tag }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ steps.vars.outputs.commit_sha }}
            org.opencontainers.image.description=Locked uv environment from branch ${{ steps.vars.outputs.branch }} for Nextflow tasks

      - name: Build amd64 test image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          load: true
          pull: true
          push: false
          platforms: linux/amd64
          tags: container-forge-smoke:amd64
          build-args: PYTHON_VERSION=${{ steps.vars.outputs.python_version }}
          cache-from: type=gha,scope=${{ steps.vars.outputs.cache_scope }}
          cache-to: type=gha,mode=max,scope=${{ steps.vars.outputs.cache_scope }}

      - name: Smoke-test amd64 image
        run: ./scripts/run-docker-smoke-test.sh container-forge-smoke:amd64 linux/amd64

      - name: Build arm64 test image
        if: inputs.include_arm64
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          load: true
          pull: true
          push: false
          platforms: linux/arm64
          tags: container-forge-smoke:arm64
          build-args: PYTHON_VERSION=${{ steps.vars.outputs.python_version }}
          cache-from: type=gha,scope=${{ steps.vars.outputs.cache_scope }}
          cache-to: type=gha,mode=max,scope=${{ steps.vars.outputs.cache_scope }}

      - name: Smoke-test arm64 image
        if: inputs.include_arm64
        run: ./scripts/run-docker-smoke-test.sh container-forge-smoke:arm64 linux/arm64

      - name: Build and push candidate
        id: push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          pull: true
          push: true
          platforms: ${{ steps.vars.outputs.platforms }}
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          build-args: PYTHON_VERSION=${{ steps.vars.outputs.python_version }}
          cache-from: type=gha,scope=${{ steps.vars.outputs.cache_scope }}
          cache-to: type=gha,mode=max,scope=${{ steps.vars.outputs.cache_scope }}
          provenance: false

      - name: Validate candidate manifest platforms
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
          IMAGE: ${{ steps.vars.outputs.image }}
          PLATFORMS: ${{ steps.vars.outputs.platforms }}
        shell: bash
        run: |
          set -euo pipefail
          raw_manifest="$(docker buildx imagetools inspect --raw "$IMAGE@$DIGEST")"
          if jq -e '.manifests | type == "array"' >/dev/null <<< "$raw_manifest"; then
            actual="$(jq -r '.manifests[].platform | "\(.os)/\(.architecture)"' \
              <<< "$raw_manifest" | sort)"
            expected="$(tr ',' '\n' <<< "$PLATFORMS" | sort)"
            [[ "$actual" == "$expected" ]] || {
              echo 'Candidate contains unexpected manifest platforms:' >&2
              printf '%s\n' "$actual" >&2
              exit 1
            }
          else
            [[ "$PLATFORMS" == linux/amd64 ]] || {
              echo 'A multi-platform build did not produce an image index.' >&2
              exit 1
            }
          fi

      - name: Install Apptainer 1.5.2
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends software-properties-common
          sudo add-apt-repository -y ppa:apptainer/ppa
          sudo apt-get update
          version="$(apt-cache madison apptainer | awk '$3 ~ /^1\.5\.2([+~:-]|$)/ { print $3; exit }')"
          [[ -n "$version" ]] || {
            echo 'Apptainer 1.5.2 is unavailable from the official PPA.' >&2
            exit 1
          }
          sudo apt-get install -y --no-install-recommends "apptainer=$version"
          apptainer version | grep -F '1.5.2'

      - name: Smoke-test candidate tag with Apptainer
        env:
          APPTAINER_DOCKER_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
          APPTAINER_DOCKER_USERNAME: ${{ github.actor }}
          CANDIDATE_TAG: ${{ steps.vars.outputs.candidate_tag }}
          IMAGE: ${{ steps.vars.outputs.image }}
        shell: bash
        run: |
          set -euo pipefail
          work="$RUNNER_TEMP/apptainer-smoke"
          image_file="$RUNNER_TEMP/environment.sif"
          mkdir -p "$work"
          cp scripts/container-smoke-test.sh "$work/"
          chmod 0777 "$work"
          apptainer pull "$image_file" "docker://${IMAGE}:${CANDIDATE_TAG}"
          apptainer exec --cleanenv --bind "$work:/work" --pwd /work \
            "$image_file" /bin/bash -ue /work/container-smoke-test.sh
          [[ "$(<"$work/smoke-output.txt")" == nextflow-container-ok ]]
          [[ "$(stat -c '%u' "$work/smoke-output.txt")" == "$(id -u)" ]]

      - name: Install Nextflow 26.04.6
        uses: nf-core/setup-nextflow@b4ec1bc7c16a94435159de94a05253542fddf6ef # v3
        with:
          version: 26.04.6

      - name: Smoke-test candidate tag through Nextflow and Apptainer
        env:
          APPTAINER_CACHEDIR: ${{ runner.temp }}/apptainer-cache
          APPTAINER_DOCKER_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
          APPTAINER_DOCKER_USERNAME: ${{ github.actor }}
          CANDIDATE_TAG: ${{ steps.vars.outputs.candidate_tag }}
          IMAGE: ${{ steps.vars.outputs.image }}
          NXF_APPTAINER_CACHEDIR: ${{ runner.temp }}/nextflow-apptainer-cache
        shell: bash
        run: |
          set -euo pipefail
          pipeline="$RUNNER_TEMP/container-smoke.nf"
          mkdir -p "$APPTAINER_CACHEDIR" "$NXF_APPTAINER_CACHEDIR"
          cat > "$pipeline" <<'EOF'
          nextflow.enable.dsl = 2

          process containerSmoke {
              input:
              path smoke_script

              output:
              path 'smoke-output.txt'

              script:
              """
              /bin/bash -ue ${smoke_script}
              """
          }

          workflow {
              containerSmoke(Channel.fromPath(params.smoke_script, checkIfExists: true))
          }
          EOF
          nextflow run "$pipeline" -ansi-log false \
            -with-apptainer "$IMAGE:$CANDIDATE_TAG" \
            --smoke_script "$PWD/scripts/container-smoke-test.sh"

      - name: Promote tested candidate to release tags
        env:
          COMMIT_SHA: ${{ steps.vars.outputs.commit_sha }}
          DIGEST: ${{ steps.push.outputs.digest }}
          IMAGE: ${{ steps.vars.outputs.image }}
        shell: bash
        run: |
          set -euo pipefail
          source_ref="$IMAGE@$DIGEST"
          docker buildx imagetools create --prefer-index=false \
            --tag "$IMAGE:$COMMIT_SHA" "$source_ref"
          docker buildx imagetools create --prefer-index=false \
            --tag "$IMAGE:latest" "$source_ref"
          for tag in "$COMMIT_SHA" latest; do
            actual="$(docker buildx imagetools inspect "$IMAGE:$tag" | \
              awk '$1 == "Digest:" { print $2; exit }')"
            [[ "$actual" == "$DIGEST" ]] || {
              echo "$IMAGE:$tag resolved to $actual instead of $DIGEST" >&2
              exit 1
            }
          done

      - name: Attest tested release
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ${{ steps.vars.outputs.image }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: Check anonymous pull access and summarize release
        env:
          COMMIT_SHA: ${{ steps.vars.outputs.commit_sha }}
          DIGEST: ${{ steps.push.outputs.digest }}
          IMAGE: ${{ steps.vars.outputs.image }}
        shell: bash
        run: |
          set -euo pipefail
          repository="${IMAGE#ghcr.io/}"
          token_response=''
          if token_response="$(curl -sSLG 'https://ghcr.io/token' \
            --data-urlencode "scope=repository:${repository}:pull")"; then
            token="$(jq -r '.token // empty' <<< "$token_response")"
          else
            token=''
          fi
          status=000
          if [[ -n "$token" ]]; then
            if ! status="$(curl -sS -o /dev/null -w '%{http_code}' \
              -H "Authorization: Bearer $token" \
              -H 'Accept: application/vnd.oci.image.index.v1+json, application/vnd.oci.image.manifest.v1+json' \
              "https://ghcr.io/v2/${repository}/manifests/${COMMIT_SHA}")"; then
              status=000
            fi
          fi
          {
            echo '## Published container'
            echo
            echo "- Commit tag: \`$IMAGE:$COMMIT_SHA\`"
            echo "- OCI digest: \`$IMAGE@$DIGEST\`"
            echo '- BuildKit in-index provenance: disabled'
            echo '- Signed GitHub build attestation: published'
            if [[ "$status" == 200 ]]; then
              echo '- Anonymous GHCR pull: available'
            else
              echo '- Anonymous GHCR pull: unavailable; make a new GHCR package public before cluster use'
            fi
          } >> "$GITHUB_STEP_SUMMARY"
          if [[ "$status" != 200 ]]; then
            echo "::warning::Anonymous pull returned HTTP $status. Make the GHCR package public before cluster use."
          fi
